spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ordersdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

# ── inventory-service URL (Factor III) ────────────────────────────────────────
inventory:
  service:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8083}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  # Expose circuit breaker state in /actuator/health
  health:
    circuitbreakers:
      enabled: true

# ── Resilience4j — circuit breaker for inventory-service ──────────────────────
resilience4j:
  circuitbreaker:
    instances:
      inventory-service:
        # Use a count-based sliding window of 5 calls
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        # Open the circuit when 60% of calls fail
        failureRateThreshold: 60
        # Wait 10 seconds in OPEN state before trying again
        waitDurationInOpenState: 10s
        # Allow 2 probe calls in HALF-OPEN state
        permittedNumberOfCallsInHalfOpenState: 2
        # Treat these exceptions as failures
        recordExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        # Register health indicator so state shows in /actuator/health
        registerHealthIndicator: true

  retry:
    instances:
      inventory-service:
        maxAttempts: 3
        waitDuration: 500ms
        # Only retry on connection/timeout errors, not 4xx
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException

  timelimiter:
    instances:
      inventory-service:
        # Give up after 2 seconds — prevents thread exhaustion
        timeoutDuration: 2s

# ── Logging — structured output with traceId ──────────────────────────────────
logging:
  level:
    com.example.order: DEBUG
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name},%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
